name: Validate format using clang

on:
  pull_request:
    branches: "main"

jobs:
  formatting-check:
    name: Formatting Check
    runs-on: ubuntu-latest
    
    env:
      PIP_BREAK_SYSTEM_PACKAGES: 1 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # This saves the clang-format binaries so it doesn't download them from scratch every PR
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-clang-format-21
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install clang-format natively (bypassing the Docker volume bug!)
      - name: Install clang-format 21
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install clang-format==21.1.1

      # Run the check on your actual files
      - name: Run clang-format style check
        run: |
          # Find all C/C++ files in the src folder and pass them to clang-format
          find '${{ github.workspace }}/src' -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.hpp" -o -name "*.c" \) | xargs -r clang-format --dry-run --Werror